<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Vanity HUD</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            max-width: 500px;
        }

        .vanity-btn {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 15px 30px;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 140px;
        }

        .vanity-btn:hover {
            background-color: #ffffff;
            color: #1a1a1a;
        }
    </style>
</head>
<body>

    <h1>Aesthetic Vanity</h1>

    <div class="button-container">
        <button class="vanity-btn" onclick="sendCustomData('eyes', 'style1')">Eye's</button>
        <button class="vanity-btn" onclick="sendCustomData('brows', 'style1')">Brow's</button>
        <button class="vanity-btn" onclick="sendCustomData('lashes', 'style1')">Lashes</button>
        <button class="vanity-btn" onclick="sendCustomData('lips', 'style1')">Lip's</button>
        <button class="vanity-btn" onclick="sendCustomData('blush', 'style1')">Blush</button>
        <button class="vanity-btn" onclick="sendCustomData('moles', 'style1')">Moles</button>
        <button class="vanity-btn" onclick="sendCustomData('tattoos', 'style1')">Tattoo's</button>
    </div>

    <script>
        function sendCustomData(targetPart, colorName) {
            const urlParams = new URLSearchParams(window.location.search);
            const simUrl = urlParams.get('sim_url');

            if (!simUrl) {
                console.log("HUD not connected.");
                return;
            }

            // Attaches your folder data as a safe query string
            const requestUrl = simUrl + "/?target=" + targetPart + "&color=" + colorName;
            
            // Forces the data through via a background GET request, bypassing CORS blocks
            fetch(requestUrl, { mode: 'no-cors' });
        }
    </script>
</body>
</html>
