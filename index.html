<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Vanity HUD</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* This is your new diagnostic screen */
        #status-text {
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
            transition: color 0.2s;
        }

        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            max-width: 500px;
        }

        .vanity-btn {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 15px 30px;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 140px;
        }

        .vanity-btn:hover {
            background-color: #ffffff;
            color: #1a1a1a;
        }
    </style>
</head>
<body>

    <h1 id="status-text">Aesthetic Vanity</h1>

    <div class="button-container">
        <button class="vanity-btn" onclick="sendCustomData('eyes', 'style1')">Eye's</button>
        <button class="vanity-btn" onclick="sendCustomData('brows', 'style1')">Brow's</button>
        <button class="vanity-btn" onclick="sendCustomData('lashes', 'style1')">Lashes</button>
        <button class="vanity-btn" onclick="sendCustomData('lips', 'style1')">Lip's</button>
        <button class="vanity-btn" onclick="sendCustomData('blush', 'style1')">Blush</button>
        <button class="vanity-btn" onclick="sendCustomData('moles', 'style1')">Moles</button>
        <button class="vanity-btn" onclick="sendCustomData('tattoos', 'style1')">Tattoo's</button>
    </div>

    <script>
        function sendCustomData(targetPart, colorName) {
            const statusEl = document.getElementById('status-text');
            statusEl.innerText = "CHECKING URL...";
            statusEl.style.color = "#aaaaaa";

            // Check if the secret Second Life link actually made it to the webpage
            const urlParams = new URLSearchParams(window.location.search);
            const simUrl = urlParams.get('sim_url');

            if (!simUrl) {
                statusEl.innerText = "ERR: NO CONNECTION";
                statusEl.style.color = "#ff4444"; // Turns Red
                return;
            }

            statusEl.innerText = "SENDING TO SL...";

            // Send raw, simple text (e.g. "lips,style1")
            const payload = targetPart + "," + colorName;

            fetch(simUrl, {
                method: 'POST',
                body: payload
            }).then(response => {
                statusEl.innerText = "COMMAND SENT!";
                statusEl.style.color = "#44ff44"; // Turns Green
                
                // Resets the title back to normal after 3 seconds
                setTimeout(() => { 
                    statusEl.innerText = "Aesthetic Vanity"; 
                    statusEl.style.color = "#ffffff"; 
                }, 3000);
                
            }).catch(error => {
                statusEl.innerText = "NETWORK ERROR";
                statusEl.style.color = "#ff4444"; // Turns Red
            });
        }
    </script>
</body>
</html>
