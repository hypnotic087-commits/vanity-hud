<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COREX//SYNC Vanity</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
        }

        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            max-width: 500px;
        }

        .vanity-btn {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 15px 30px;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 140px;
        }

        .vanity-btn:hover {
            background-color: #ffffff;
            color: #1a1a1a;
        }
    </style>
</head>
<body>

    <h1>COREX//SYNC Vanity</h1>

    <div class="button-container">
        <button class="vanity-btn" onclick="sendCustomData(this, 'eyes', 'style1')">Eye's</button>
        <button class="vanity-btn" onclick="sendCustomData(this, 'brows', 'style1')">Brow's</button>
        <button class="vanity-btn" onclick="sendCustomData(this, 'lashes', 'style1')">Lashes</button>
        <button class="vanity-btn" onclick="sendCustomData(this, 'lips', 'style1')">Lip's</button>
        <button class="vanity-btn" onclick="sendCustomData(this, 'blush', 'style1')">Blush</button>
        <button class="vanity-btn" onclick="sendCustomData(this, 'moles', 'style1')">Moles</button>
        <button class="vanity-btn" onclick="sendCustomData(this, 'tattoos', 'style1')">Tattoo's</button>
    </div>

    <iframe name="secret_frame" style="display:none;"></iframe>
    <form id="sl_form" method="POST" target="secret_frame" style="display:none;">
        <input type="hidden" id="payload_data" name="cmd">
    </form>

    <script>
        function sendCustomData(buttonElement, targetPart, colorName) {
            // Grabs the secure URL passed from the LSL script via the hash
            let simUrl = window.location.hash.substring(1);

            // Visual check if the URL is blocked or missing
            if (!simUrl) {
                buttonElement.innerText = "URL BLOCKED";
                buttonElement.style.borderColor = "#ff4444";
                buttonElement.style.color = "#ff4444";
                return;
            }

            // Decode the URL for the form action
            simUrl = decodeURIComponent(simUrl);

            const form = document.getElementById('sl_form');
            const input = document.getElementById('payload_data');
            
            form.action = simUrl;
            // PREPEND "cmd=" SO THE LSL SCRIPT PARSES IT CORRECTLY
            input.value = "cmd=" + targetPart + "," + colorName;
            
            form.submit();
        }
    </script>
</body>
</html>
