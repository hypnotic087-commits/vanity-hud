<!DOCTYPE html>
<html>
<head>
    <style>
        /* This sets the dark grey background and text style */
        body { 
            background: #222; 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            margin-top: 20px;
        }

        /* Styling for the top Tab Menu */
        .tab-bar { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 20px; 
        }
        .tab-btn { 
            padding: 10px 20px; 
            background: #444; 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 5px;
        }
        .tab-btn.active { 
            background: #888; /* Highlights the selected tab */
        }

        /* Hides sections unless they are active */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Styling for the color swatches */
        .swatch { 
            width: 60px; 
            height: 60px; 
            border-radius: 10px; 
            border: 2px solid white; 
            cursor: pointer; 
            margin: 5px;
        }
    </style>
</head>
<body>

    <h2>Aesthetic Vanity</h2>

    <!-- THE TABS -->
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('lips')">Lips</button>
        <button class="tab-btn" onclick="switchTab('eyes')">Eyes</button>
    </div>

    <!-- LIPS SECTION -->
    <div id="lips" class="tab-content active">
        <h3>Lip Colors</h3>
        <button class="swatch" style="background: red;" onclick="sendToSL('lips', 'red')"></button>
        <button class="swatch" style="background: pink;" onclick="sendToSL('lips', 'pink')"></button>
    </div>

    <!-- EYES SECTION -->
    <div id="eyes" class="tab-content">
        <h3>Eye Colors</h3>
        <button class="swatch" style="background: blue;" onclick="sendToSL('eyes', 'blue')"></button>
        <button class="swatch" style="background: green;" onclick="sendToSL('eyes', 'green')"></button>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // 1. Logic to switch between tabs
        function switchTab(tabId) {
            // Hide all content and remove active state from all buttons
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            // Show the clicked tab
            document.getElementById(tabId).classList.add('active');
            
            // Note: In a real HUD, you'd match the button clicked to add the active class to it too.
        }

        // 2. Logic to package and send data to Second Life
        function sendToSL(layer, color) {
            // Package the data into a JSON string
            let commandData = JSON.stringify({ "target": layer, "color": color });
            
            // For testing in your browser, we'll just log it to the console/alert
            alert("This will send to SL: " + commandData);

            /* 
            When we connect this to SL later, we will use this code instead:
            fetch(SECOND_LIFE_URL, { method: 'POST', body: commandData });
            */
        }
    </script>
</body>
</html>
